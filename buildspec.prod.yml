version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm install
  build:
    commands:
      - mkdir ~/.aws
      - printf "[default]\naws_access_key_id=%s\naws_secret_access_key=%s" $AWS_ACCESS_KEY_ID $AWS_SECRET_ACCESS_KEY > ~/.aws/credentials
      - npm install
      - sh utils/deploy-prod.sh